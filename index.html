  const handleResize=()=>{
    if(!resizeImg)return;
    const canvas=document.createElement("canvas");
    canvas.width=resizeSize.w;canvas.height=resizeSize.h;
    const ctx=canvas.getContext("2d");
    const img=new Image();
    img.onload=()=>{
      ctx.fillStyle="#000";ctx.fillRect(0,0,canvas.width,canvas.height);
      const scale=Math.max(canvas.width/img.width,canvas.height/img.height);
      const x=(canvas.width-img.width*scale)/2;const y=(canvas.height-img.height*scale)/2;
      ctx.drawImage(img,x,y,img.width*scale,img.height*scale);
      setResizeResult(canvas.toDataURL("image/jpeg",0.92));
    };
    img.src=resizeImg;
  };

  const handleCollage=()=>{
    if(collageImgs.length<2)return;
    const canvas=document.createElement("canvas");
    const size=1080;canvas.width=size;canvas.height=size;
    const ctx=canvas.getContext("2d");
    ctx.fillStyle="#0a0a0a";ctx.fillRect(0,0,size,size);
    const gap=8;
    const loadImg=src=>new Promise(res=>{const i=new Image();i.onload=()=>res(i);i.src=src;});
    const drawImg=(img,x,y,w,h)=>{
      const scale=Math.max(w/img.width,h/img.height);
      const sx=(img.width*scale-w)/2;const sy=(img.height*scale-h)/2;
      ctx.save();ctx.beginPath();ctx.rect(x,y,w,h);ctx.clip();
      ctx.drawImage(img,-sx+x,-sy+y,img.width*scale,img.height*scale);
      ctx.restore();
    };
    Promise.all(collageImgs.slice(0,4).map(u=>loadImg(u))).then(imgs=>{
      const half=(size-gap*3)/2;
      if(collageLayout==="2x2"){
        if(imgs[0])drawImg(imgs[0],gap,gap,half,half);
        if(imgs[1])drawImg(imgs[1],gap*2+half,gap,half,half);
        if(imgs[2])drawImg(imgs[2],gap,gap*2+half,half,half);
        if(imgs[3])drawImg(imgs[3],gap*2+half,gap*2+half,half,half);
      }else if(collageLayout==="1+2"){
        const bigH=(size-gap*2)*0.6;const smH=size-bigH-gap*3;
        if(imgs[0])drawImg(imgs[0],gap,gap,size-gap*2,bigH);
        if(imgs[1])drawImg(imgs[1],gap,bigH+gap*2,half,smH);
        if(imgs[2])drawImg(imgs[2],gap*2+half,bigH+gap*2,half,smH);
      }else{
        const w=(size-gap*4)/3;
        imgs.slice(0,3).forEach((img,i)=>{if(img)drawImg(img,gap+i*(w+gap),gap,w,size-gap*2);});
      }
      setCollageResult(canvas.toDataURL("image/jpeg",0.92));
    });
  };

  const applyMarcaAgua=()=>{
    if(!maguaImg)return;
    const canvas=document.createElement("canvas");
    const img=new Image();
    img.onload=()=>{
      canvas.width=img.width;canvas.height=img.height;
      const ctx=canvas.getContext("2d");
      ctx.drawImage(img,0,0);
      const logoSize=Math.min(img.width,img.height)*(maguaSize/100);
      ctx.globalAlpha=maguaOpacity/100;
      ctx.font=`bold ${logoSize*0.4}px system-ui`;
      const text="🌱 Huerta Agroecológica SXXI";
      const metrics=ctx.measureText(text);
      let x=img.width-20,y=img.height-20;
      ctx.textAlign="right";ctx.textBaseline="bottom";
      if(maguaPos==="topRight"){x=img.width-20;y=logoSize*0.5+20;ctx.textBaseline="top";}
      if(maguaPos==="bottomLeft"){ctx.textAlign="left";x=20;y=img.height-20;}
      if(maguaPos==="topLeft"){ctx.textAlign="left";x=20;y=logoSize*0.5+20;ctx.textBaseline="top";}
      if(maguaPos==="center"){ctx.textAlign="center";x=img.width/2;y=img.height/2;ctx.textBaseline="middle";}
      const tw=metrics.width;
      const tx=ctx.textAlign==="right"?x-tw:ctx.textAlign==="left"?x:x-tw/2;
      const ty=ctx.textBaseline==="bottom"?y-logoSize*0.5:ctx.textBaseline==="top"?y:y-logoSize*0.25;
      ctx.globalAlpha=(maguaOpacity/100)*0.4;ctx.fillStyle="#000";
      ctx.fillRect(tx-10,ty-5,tw+20,logoSize*0.55);
      ctx.globalAlpha=maguaOpacity/100;ctx.fillStyle="#fff";
      ctx.fillText(text,x,y);ctx.globalAlpha=1;
      setMaguaResult(canvas.toDataURL("image/jpeg",0.95));
    };
    img.src=maguaImg;
  };

            {step===3&&(<div>

            </div>)}

                  {previewImg&&<img src={previewImg} style={{width:"100%",height:"100%",objectFit:"cover",filter:filter==="none"?"none":filter}}/>}
                  {textOverlay&&<div style={{position:"absolute",bottom:16,left:0,right:0,textAlign:"center",color:overlayColor,fontSize:Math.max(overlaySize*0.6,12),fontWeight:800,fontFamily:overlayFont,textShadow:"0 2px 8px rgba(0,0,0,0.8)",padding:"0 10px"}}>{textOverlay}</div>}

              </div>
              <Btn onClick={saveToHistory} style={{marginBottom:10}}>💾 Guardar en historial</Btn>
              <Btn onClick={()=>{setStep(0);setFiles([]);setCopy("");setHashtags([]);setUserText("");setFilter("none");setTextOverlay("");}} style={{background:"rgba(255,255,255,0.08)"}}>🔄 Nuevo contenido</Btn>
            </div>)}
          </div>
        )}

        {/* DISEÑO */}
        {tab===2&&(
          <div>
            <h2 style={{textAlign:"center",marginBottom:16,fontSize:18}}>🎨 Herramientas de Diseño</h2>
            <div style={{display:"flex",gap:6,marginBottom:20,overflowX:"auto",paddingBottom:4}}>

            </div>
            {designTab===0&&(<div>

              {resizeResult&&<Card style={{textAlign:"center"}}><Lbl>✅ {resizeSize.label}</Lbl><img src={resizeResult} style={{maxWidth:"100%",borderRadius:10,marginBottom:10,maxHeight:250,objectFit:"contain"}}/><a href={resizeResult} download={`huerta-${resizeSize.label.replace(/ /g,"-")}.jpg`} style={{textDecoration:"none"}}><Btn style={{background:"linear-gradient(135deg,#43e97b,#38f9d7)"}}>⬇️ Descargar</Btn></a></Card>}
            </div>)}
            {designTab===1&&(<div>
              <div onClick={()=>collageRef.current.click()} style={{border:"2px dashed rgba(0,201,167,0.3)",borderRadius:16,padding:20,textAlign:"center",cursor:"pointer",background:"rgba(0,201,167,0.05)",marginBottom:14}}>

            </div>
            {pedidosFiltrados.length===0?(<div style={{textAlign:"center",padding:40,color:"rgba(255,255,255,0.3)"}}><div style={{fontSize:40,marginBottom:12}}>🛒</div><div style={{marginBottom:16}}>{pedidos.length===0?"Todavía no tenés pedidos":"No hay pedidos con ese filtro"}</div>{pedidos.length===0&&<button onClick={()=>setShowAddPedido(true)} style={{padding:"10px 24px",borderRadius:12,border:"none",background:"linear-gradient(135deg,#00c9a7,#00b4db)",color:"#fff",fontWeight:700,cursor:"pointer"}}>+ Primer pedido</button>}</div>):(
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {pedidosFiltrados.map((p,i)=>{
                  const realIdx=pedidos.indexOf(p);
                  const estadoColor=p.estado==="pendiente"?"#feca57":p.estado==="entregado"?"#00c9a7":"#ff5757";
                  const estadoIcon=p.estado==="pendiente"?"🟡":p.estado==="entregado"?"✅":"❌";
                  const canalIcon=p.canal==="whatsapp"?"💬":p.canal==="instagram"?"📸":p.canal==="telefono"?"📞":"🤝";
                  return(<Card key={p.id} style={{border:`1px solid ${estadoColor}30`}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                      <div><div style={{fontWeight:700,fontSize:15}}>{canalIcon} {p.cliente}</div>{p.telefono&&<div style={{fontSize:11,color:"rgba(255,255,255,0.4)"}}>📱 {p.telefono}</div>}</div>
                      <span style={{fontSize:12,background:`${estadoColor}25`,color:estadoColor,padding:"3px 10px",borderRadius:20,fontWeight:700,height:"fit-content"}}>{estadoIcon} {p.estado}</span>
                    </div>
                    {p.items.length>0&&<div style={{background:"rgba(0,0,0,0.2)",borderRadius:8,padding:"8px 10px",marginBottom:8}}>{p.items.map((item,ii)=><div key={ii} style={{fontSize:12,color:"rgba(255,255,255,0.7)",padding:"2px 0"}}>{item.cantidad}x {item.nombre} — {item.precio}</div>)}</div>}
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                      {p.total&&<div style={{fontWeight:700,color:"#00c9a7",fontSize:15}}>Total: ${(+p.total).toLocaleString()}</div>}
                      {p.entrega&&<div style={{fontSize:12,color:"rgba(255,255,255,0.5)"}}>📅 {new Date(p.entrega+"T12:00").toLocaleDateString("es-AR")}</div>}
                    </div>
                    {p.nota&&<div style={{fontSize:12,color:"rgba(255,255,255,0.5)",fontStyle:"italic",marginBottom:8}}>📝 {p.nota}</div>}
                    <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap"}}>
                      {p.estado!=="pendiente"&&<button onClick={()=>updateEstado(realIdx,"pendiente")} style={{padding:"5px 10px",borderRadius:8,border:"1px solid #feca57",background:"rgba(254,202,87,0.15)",color:"#feca57",fontSize:11,cursor:"pointer"}}>🟡 Pendiente</button>}
                      {p.estado!=="entregado"&&<button onClick={()=>updateEstado(realIdx,"entregado")} style={{padding:"5px 10px",borderRadius:8,border:"1px solid #00c9a7",background:"rgba(0,201,167,0.15)",color:"#00c9a7",fontSize:11,cursor:"pointer"}}>✅ Entregado</button>}
                      {p.estado!=="cancelado"&&<button onClick={()=>updateEstado(realIdx,"cancelado")} style={{padding:"5px 10px",borderRadius:8,border:"1px solid #ff5757",background:"rgba(255,87,87,0.15)",color:"#ff5757",fontSize:11,cursor:"pointer"}}>❌ Cancelar</button>}
                    </div>
                    <div style={{display:"flex",gap:6}}>
                      <button onClick={()=>whatsappPedido(p)} style={{flex:1,padding:"8px",borderRadius:8,border:"none",background:"linear-gradient(135deg,#25d366,#128c7e)",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>💬 Enviar resumen WA</button>
                      <button onClick={()=>{setEditPedidoIdx(realIdx);setPedidoForm({...p});setShowAddPedido(true);}} style={{padding:"8px 12px",borderRadius:8,border:"none",background:"rgba(255,255,255,0.1)",color:"#fff",fontSize:12,cursor:"pointer"}}>✏️</button>
                      <button onClick={()=>deletePedido(realIdx)} style={{padding:"8px 12px",borderRadius:8,border:"none",background:"rgba(255,87,87,0.2)",color:"#ff5757",fontSize:12,cursor:"pointer"}}>🗑️</button>
                    </div>
                  </Card>);
                })}
              </div>
            )}
          </div>
        )}

        {/* HUERTA */}
        {tab===7&&(
          <div>
            <h2 style={{textAlign:"center",marginBottom:16,fontSize:18}}>🌿 Herramientas de Huerta</h2>
            <div style={{display:"flex",gap:6,marginBottom:20,overflowX:"auto",paddingBottom:4}}>
              {["🤖 Chat IA","💧 Marca agua","💰 Calculadora","🍳 Recetas","📦 Cosechas"].map((t,i)=>(
                <button key={t} onClick={()=>setHTab(i)} style={{padding:"7px 12px",borderRadius:20,border:`1px solid ${hTab===i?"#00c9a7":"rgba(255,255,255,0.2)"}`,background:hTab===i?"rgba(0,201,167,0.2)":"transparent",color:hTab===i?"#00c9a7":"rgba(255,255,255,0.6)",fontSize:11,cursor:"pointer",whiteSpace:"nowrap",fontWeight:hTab===i?700:400}}>{t}</button>
              ))}
            </div>
            {hTab===0&&(<div>
              <div style={{background:"rgba(0,0,0,0.3)",borderRadius:16,padding:14,marginBottom:12,maxHeight:360,overflowY:"auto",display:"flex",flexDirection:"column",gap:10}}>
                {chatMsgs.map((m,i)=>(
                  <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
                    <div style={{maxWidth:"85%",background:m.role==="user"?"rgba(0,201,167,0.25)":"rgba(255,255,255,0.08)",borderRadius:m.role==="user"?"16px 16px 4px 16px":"16px 16px 16px 4px",padding:"10px 14px",fontSize:13,lineHeight:1.5,color:"#fff"}}>
                      {m.role==="assistant"&&<span style={{marginRight:6}}>🌱</span>}{m.text}
                    </div>
                  </div>
                ))}
                {chatLoading&&<div style={{display:"flex",justifyContent:"flex-start"}}><div style={{background:"rgba(255,255,255,0.08)",borderRadius:"16px 16px 16px 4px",padding:"10px 14px",fontSize:13,color:"rgba(255,255,255,0.5)"}}>🌱 Pensando...</div></div>}
              </div>
              <div style={{display:"flex",gap:8}}>
                <input value={chatInput} onChange={e=>setChatInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendChat()} placeholder="Ej: ¿Cuándo planto tomates?" style={{flex:1,background:"rgba(255,255,255,0.07)",border:"1px solid rgba(0,201,167,0.2)",borderRadius:12,padding:"12px 16px",color:"#fff",fontSize:13}}/>
                <button onClick={sendChat} disabled={chatLoading||!chatInput.trim()} style={{padding:"12px 18px",borderRadius:12,border:"none",background:chatLoading?"rgba(255,255,255,0.1)":"linear-gradient(135deg,#00c9a7,#00b4db)",color:"#fff",fontWeight:700,fontSize:14,cursor:chatLoading?"not-allowed":"pointer"}}>➤</button>
              </div>
              <div style={{display:"flex",gap:6,marginTop:10,flexWrap:"wrap"}}>
                {["¿Qué plantar en otoño?","¿Cómo combatir pulgones?","¿Cómo hacer compost?","¿Cuándo regar?"].map(q=>(
                  <button key={q} onClick={()=>setChatInput(q)} style={{padding:"5px 10px",borderRadius:16,border:"1px solid rgba(0,201,167,0.3)",background:"rgba(0,201,167,0.1)",color:"#00c9a7",fontSize:11,cursor:"pointer"}}>{q}</button>
                ))}
              </div>
            </div>)}
            {hTab===1&&(<div>
              <div onClick={()=>maguaRef.current.click()} style={{border:"2px dashed rgba(0,201,167,0.3)",borderRadius:16,padding:20,textAlign:"center",cursor:"pointer",background:"rgba(0,201,167,0.05)",marginBottom:14}}>
                {maguaImg?<img src={maguaImg} style={{maxWidth:"100%",maxHeight:200,borderRadius:10,objectFit:"contain"}}/>:<><div style={{fontSize:34,marginBottom:8}}>📷</div><div style={{fontSize:14}}>Seleccioná la foto</div></>}
                <input ref={maguaRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>{if(e.target.files[0]){setMaguaImg(URL.createObjectURL(e.target.files[0]));setMaguaResult(null);}}}/>
              </div>
              <Card style={{marginBottom:14}}>
                <Lbl>Posición</Lbl>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:12}}>
                  {[{v:"topLeft",l:"↖ Arriba izq"},{v:"topRight",l:"↗ Arriba der"},{v:"center",l:"⊕ Centro"},{v:"bottomLeft",l:"↙ Abajo izq"},{v:"bottomRight",l:"↘ Abajo der"}].map(p=>(
                    <button key={p.v} onClick={()=>setMaguaPos(p.v)} style={{padding:"8px 4px",borderRadius:8,border:`1px solid ${maguaPos===p.v?"#00c9a7":"rgba(255,255,255,0.15)"}`,background:maguaPos===p.v?"rgba(0,201,167,0.2)":"rgba(255,255,255,0.05)",color:"#fff",fontSize:11,cursor:"pointer"}}>{p.l}</button>
                  ))}
                </div>
                <Lbl>Opacidad: {maguaOpacity}%</Lbl>
                <input type="range" min={20} max={100} value={maguaOpacity} onChange={e=>setMaguaOpacity(+e.target.value)} style={{width:"100%",marginBottom:10}}/>
                <Lbl>Tamaño: {maguaSize}%</Lbl>
                <input type="range" min={10} max={40} value={maguaSize} onChange={e=>setMaguaSize(+e.target.value)} style={{width:"100%"}}/>
              </Card>
              <Btn onClick={applyMarcaAgua} disabled={!maguaImg} style={{marginBottom:14}}>💧 Aplicar marca de agua</Btn>
              {maguaResult&&<Card style={{textAlign:"center"}}><Lbl>✅ Lista para descargar</Lbl><img src={maguaResult} style={{maxWidth:"100%",maxHeight:250,borderRadius:10,marginBottom:10,objectFit:"contain"}}/><a href={maguaResult} download="huerta-con-marca.jpg" style={{textDecoration:"none"}}><Btn style={{background:"linear-gradient(135deg,#43e97b,#38f9d7)"}}>⬇️ Descargar</Btn></a></Card>}
            </div>)}
            {hTab===2&&(<div>
              <Card style={{marginBottom:14}}>
                <Lbl>Nombre del producto</Lbl>
                <input value={calcNombre} onChange={e=>setCalcNombre(e.target.value)} placeholder="Ej: Lechuga orgánica (atado)" style={{width:"100%",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(0,201,167,0.2)",borderRadius:8,padding:10,color:"#fff",fontSize:13,boxSizing:"border-box",marginBottom:12}}/>
                <Lbl>Costos de producción</Lbl>
                {calcCostos.map((c,i)=>(
                  <div key={i} style={{display:"flex",gap:8,marginBottom:6,alignItems:"center"}}>
                    <input value={c.concepto} onChange={e=>setCalcCostos(p=>p.map((x,idx)=>idx===i?{...x,concepto:e.target.value}:x))} style={{flex:2,background:"rgba(255,255,255,0.07)",border:"1px solid rgba(0,201,167,0.15)",borderRadius:8,padding:"8px",color:"#fff",fontSize:12,boxSizing:"border-box"}}/>
                    <input type="number" value={c.valor} onChange={e=>setCalcCostos(p=>p.map((x,idx)=>idx===i?{...x,valor:e.target.value}:x))} placeholder="$" style={{flex:1,background:"rgba(255,255,255,0.07)",border:"1px solid rgba(0,201,167,0.15)",borderRadius:8,padding:"8px",color:"#fff",fontSize:12,boxSizing:"border-box"}}/>
                    <button onClick={()=>setCalcCostos(p=>p.filter((_,idx)=>idx!==i))} style={{background:"none",border:"none",color:"#ff5757",cursor:"pointer",fontSize:16}}>✕</button>
                  </div>
                ))}
                <button onClick={()=>setCalcCostos(p=>[...p,{concepto:"",valor:""}])} style={{background:"rgba(0,201,167,0.15)",border:"1px solid rgba(0,201,167,0.3)",color:"#00c9a7",borderRadius:8,padding:"6px 14px",fontSize:12,cursor:"pointer",marginBottom:12}}>+ Agregar costo</button>
                <div style={{display:"flex",gap:10}}>
                  <div style={{flex:1}}><Lbl>Cantidad producida</Lbl><input type="number" value={calcCantidad} onChange={e=>setCalcCantidad(+e.target.value)} min={1} style={{width:"100%",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(0,201,167,0.2)",borderRadius:8,padding:10,color:"#fff",fontSize:13,boxSizing:"border-box"}}/></div>
                  <div style={{flex:1}}><Lbl>Margen: {calcMargen}%</Lbl><input type="range" min={10} max={200} value={calcMargen} onChange={e=>setCalcMargen(+e.target.value)} style={{width:"100%",marginTop:10}}/></div>
                </div>
              </Card>
              <Card style={{border:"1px solid rgba(0,201,167,0.3)"}}>
                <Lbl>📊 Resultado — {calcNombre||"Tu producto"}</Lbl>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginTop:8}}>
                  <div style={{textAlign:"center",background:"rgba(255,87,87,0.1)",borderRadius:10,padding:10}}><div style={{fontSize:11,color:"rgba(255,255,255,0.5)"}}>Costo total</div><div style={{fontWeight:700,fontSize:18,color:"#ff7675"}}>${totalCosto.toLocaleString()}</div></div>
                  <div style={{textAlign:"center",background:"rgba(254,202,87,0.1)",borderRadius:10,padding:10}}><div style={{fontSize:11,color:"rgba(255,255,255,0.5)"}}>Costo/unidad</div><div style={{fontWeight:700,fontSize:18,color:"#feca57"}}>${costoPorUnidad.toFixed(0)}</div></div>
                  <div style={{textAlign:"center",background:"rgba(0,201,167,0.15)",borderRadius:10,padding:10}}><div style={{fontSize:11,color:"rgba(255,255,255,0.5)"}}>Precio venta</div><div style={{fontWeight:700,fontSize:18,color:"#00c9a7"}}>${precioVenta.toFixed(0)}</div></div>
                </div>
                <div style={{marginTop:10,fontSize:12,color:"rgba(255,255,255,0.5)",textAlign:"center"}}>Ganancia/unidad: <span style={{color:"#00c9a7",fontWeight:700}}>${(precioVenta-costoPorUnidad).toFixed(0)}</span></div>
              </Card>
            </div>)}
            {hTab===3&&(<div>
              <Card style={{marginBottom:14}}>
                <Lbl>¿Qué ingredientes tenés de la huerta?</Lbl>
                <textarea value={recetaIngredientes} onChange={e=>setRecetaIngredientes(e.target.value)} placeholder="Ej: tomates cherry, albahaca, zapallito, cebolla de verdeo..." style={{width:"100%",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(0,201,167,0.2)",borderRadius:8,padding:10,color:"#fff",fontSize:13,boxSizing:"border-box",minHeight:80,resize:"vertical",marginBottom:10}}/>
                {productos.filter(p=>p.categoria==="🌱 Producto"||p.categoria==="🥗 Elaboración").length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {productos.filter(p=>p.categoria==="🌱 Producto"||p.categoria==="🥗 Elaboración").slice(0,6).map((p,i)=>(
                    <button key={i} onClick={()=>setRecetaIngredientes(prev=>prev?(prev+", "+p.nombre):p.nombre)} style={{padding:"4px 10px",borderRadius:12,border:"1px solid rgba(0,201,167,0.3)",background:"rgba(0,201,167,0.1)",color:"#00c9a7",fontSize:11,cursor:"pointer"}}>{p.emoji} {p.nombre}</button>
                  ))}
                </div>}
              </Card>
              <Btn onClick={generarReceta} disabled={recetaLoading||!recetaIngredientes.trim()} style={{background:recetaLoading?"rgba(255,255,255,0.1)":"linear-gradient(135deg,#feca57,#f0932b)",marginBottom:14}}>{recetaLoading?"🍳 Generando...":"🍳 Generar receta con IA"}</Btn>
              {recetaResult&&<Card style={{border:"1px solid rgba(254,202,87,0.3)"}}><Lbl>🍽️ Tu receta</Lbl><div style={{fontSize:13,lineHeight:1.7,color:"rgba(255,255,255,0.85)",whiteSpace:"pre-wrap",marginTop:8}}>{recetaResult}</div><button onClick={()=>copyToClipboard(recetaResult)} style={{marginTop:12,background:"rgba(254,202,87,0.2)",border:"none",color:"#feca57",borderRadius:8,padding:"8px 16px",fontSize:12,cursor:"pointer",width:"100%"}}>📋 Copiar receta</button></Card>}
            </div>)}
            {hTab===4&&(<div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                <div><h3 style={{fontSize:16,margin:0}}>📦 Registro de Cosechas</h3><div style={{fontSize:11,color:"rgba(255,255,255,0.4)",marginTop:2}}>{cosechas.length} registros</div></div>
                <button onClick={()=>setShowAddCosecha(true)} style={{background:"linear-gradient(135deg,#00c9a7,#00b4db)",border:"none",color:"#fff",borderRadius:10,padding:"8px 14px",fontSize:13,fontWeight:700,cursor:"pointer"}}>+ Registrar</button>
              </div>
              {cosechas.length===0?(<div style={{textAlign:"center",padding:40,color:"rgba(255,255,255,0.3)"}}><div style={{fontSize:40,marginBottom:12}}>🥬</div><div style={{marginBottom:16}}>Todavía no registraste cosechas</div><button onClick={()=>setShowAddCosecha(true)} style={{padding:"10px 24px",borderRadius:12,border:"none",background:"linear-gradient(135deg,#00c9a7,#00b4db)",color:"#fff",fontWeight:700,cursor:"pointer"}}>+ Primera cosecha</button></div>):(
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {cosechas.map((c,i)=>(
                    <Card key={c.id} style={{display:"flex",gap:12,alignItems:"center",border:"1px solid rgba(0,201,167,0.15)"}}>
                      <div style={{width:48,height:48,borderRadius:12,background:"rgba(0,201,167,0.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>🥬</div>
                      <div style={{flex:1}}><div style={{fontWeight:700,fontSize:14}}>{c.cultivo}</div><div style={{fontSize:13,color:"#00c9a7",fontWeight:600}}>{c.cantidad} {c.unidad}</div><div style={{fontSize:11,color:"rgba(255,255,255,0.4)"}}>{new Date(c.fecha+"T12:00").toLocaleDateString("es-AR")}{c.nota&&` · ${c.nota}`}</div></div>
                      <button onClick={()=>deleteCosecha(i)} style={{background:"rgba(255,87,87,0.2)",border:"none",color:"#ff5757",borderRadius:8,padding:"6px 10px",fontSize:12,cursor:"pointer",flexShrink:0}}>🗑️</button>
                    </Card>
                  ))}
                </div>
              )}
            </div>)}
          </div>
        )}

        {/* HISTORIAL */}
        {tab===8&&(
          <div>
            <h2 style={{textAlign:"center",marginBottom:16,fontSize:18}}>🕐 Historial</h2>
            {history.length===0?<div style={{textAlign:"center",padding:40,color:"rgba(255,255,255,0.3)"}}><div style={{fontSize:40,marginBottom:12}}>📂</div><div style={{marginBottom:16}}>Todavía no guardaste contenido</div><button onClick={()=>setTab(1)} style={{padding:"10px 24px",borderRadius:12,border:"none",background:"linear-gradient(135deg,#00c9a7,#00b4db)",color:"#fff",fontWeight:700,cursor:"pointer"}}>Crear contenido</button></div>:(
              <div style={{display:"flex",flexDirection:"column",gap:12}}>{history.map((h,i)=><Card key={h.id} style={{display:"flex",gap:12}}>{h.imgUrl?<img src={h.imgUrl} style={{width:56,height:56,borderRadius:10,objectFit:"cover",flexShrink:0}}/>:<div style={{width:56,height:56,borderRadius:10,background:"rgba(0,201,167,0.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>📝</div>}<div style={{flex:1,minWidth:0}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:11,background:"rgba(0,201,167,0.2)",color:"#00c9a7",padding:"2px 8px",borderRadius:10}}>{h.platform}</span><span style={{fontSize:10,color:"rgba(255,255,255,0.35)"}}>{h.date}</span></div><div style={{fontSize:12,color:"rgba(255,255,255,0.7)",lineHeight:1.4,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{h.copy}</div><div style={{display:"flex",gap:6,marginTop:6}}><button onClick={()=>copyToClipboard(h.copy+"\n\n"+h.hashtags.join(" "))} style={{background:"rgba(0,201,167,0.15)",border:"none",color:"#00c9a7",borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer"}}>Copiar</button><button onClick={()=>deleteHistory(i)} style={{background:"rgba(255,87,87,0.2)",border:"none",color:"#ff5757",borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer"}}>Borrar</button></div></div></Card>)}</div>
            )}
          </div>
        )}

      </div>
    </div>
  );
}
ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
<script>if("serviceWorker" in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("/sw.js").catch(e=>console.log("SW:",e));});}</script>
</body>
</html>
