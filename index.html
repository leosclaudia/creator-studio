<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useCallback,useEffect}=React;
const GEMINI_KEY="AIzaSyALbDopwj32v53odOvgML4c5vgJCBLefgo";
const TABS=["🏠","📤","🎨","📅","💡","🏷️","🕐"];
const TAB_LABELS=["Inicio","Crear","Diseño","Calendario","Ideas","Precios","Historial"];
const DAYS=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
const FILTERS=[{id:"none",label:"Original"},{id:"brightness(1.2) contrast(1.1)",label:"Vibrante"},{id:"grayscale(1)",label:"B&N"},{id:"saturate(1.8)",label:"Saturado"},{id:"contrast(1.3) brightness(0.9)",label:"Dramático"},{id:"sepia(0.6)",label:"Vintage"}];
const FORMATS=[{id:"1/1",label:"Feed",size:"1080x1080",icon:"⬛",w:1080,h:1080},{id:"9/16",label:"Reel",size:"1080x1920",icon:"📱",w:1080,h:1920},{id:"16/9",label:"Portada",size:"1200x630",icon:"🖥️",w:1200,h:630},{id:"4/5",label:"Portrait",size:"1080x1350",icon:"📸",w:1080,h:1350}];
const FONTS=["system-ui","Georgia, serif","'Courier New', monospace","Impact, fantasy","Verdana, sans-serif","'Trebuchet MS', sans-serif","Arial Rounded MT Bold, sans-serif"];
const FONT_LABELS=["Sistema","Clásica","Typewriter","Impacto","Verdana","Trebuchet","Redondeada"];
const MOODS=["Energética 🔥","Tranquila 🌊","Romántica 💕","Motivacional 💪","Divertida 😂"];
const STEPS_CREATE=["📤 Subir","✨ Mejorar","🖊️ Texto","✍️ Copy","📲 Exportar"];
const TONES={profesional:"profesional y serio",divertido:"divertido y con humor",inspiracional:"inspiracional y motivador",cercano:"cercano y empático",informativo:"informativo y educativo",urgente:"urgente y llamativo",formal:"formal y corporativo",juvenil:"juvenil y moderno con emojis",romantico:"romántico y emocional"};
const COPIES={
  profesional:["Compartimos con orgullo nuestro trabajo. Cada detalle fue pensado para vos. 💼✨","La excelencia no es un accidente, es el resultado del esfuerzo constante. 🎯"],
  divertido:["¡Esto es lo que pasa cuando nos ponemos creativos! 😂🎉","Modo creatividad activada al 100% 🔥😜"],
  inspiracional:["Cada día es una nueva oportunidad para brillar. ✨🌟","Los sueños no tienen fecha de vencimiento. 💫"],
  cercano:["Queremos compartir este momento especial con vos 🥰","Sin ustedes nada de esto tendría sentido. ❤️"],
  informativo:["Te contamos todo lo que necesitás saber 👇","Información importante que no podés perderte 📌"],
  urgente:["⚠️ ¡ÚLTIMAS HORAS! No dejes pasar esta oportunidad.","🚨 Quedan muy pocos lugares. ¡No te quedés afuera!"],
  formal:["Nos complace presentarles nuestra propuesta. 🏢","Con profesionalismo ponemos a su disposición nuestros servicios. 📋"],
  juvenil:["¡Esto está re bueno! 🔥✨ dale si te suma","vibes de naturaleza total 💅 esto lo necesitabas fr 🫶"],
  romantico:["Hay cosas que el corazón siente antes que las palabras... 💕","Porque los momentos especiales merecen ser compartidos. 🌹✨"],
};
const HASHTAGS_BASE=["#huerta","#agroecología","#orgánico","#natural","#sustentable","#huertaurbana","#alimentosaludable","#vidanatural","#campo","#argentina","#productosnaturales","#agroecológico"];
const CATEGORIAS=["🌱 Producto","🥗 Elaboración","📚 Enseñanza","🌿 Otro"];
const catColors={"🌱 Producto":"rgba(0,201,167,0.2)","🥗 Elaboración":"rgba(255,202,87,0.2)","📚 Enseñanza":"rgba(84,160,255,0.2)","🌿 Otro":"rgba(255,159,243,0.2)"};
const catBorders={"🌱 Producto":"#00c9a7","🥗 Elaboración":"#feca57","📚 Enseñanza":"#54a0ff","🌿 Otro":"#ff9ff3"};

const SOCIAL_SIZES=[
  {label:"Instagram Feed",w:1080,h:1080,icon:"📸"},
  {label:"Instagram Story/Reel",w:1080,h:1920,icon:"📱"},
  {label:"Instagram Portrait",w:1080,h:1350,icon:"🖼️"},
  {label:"WhatsApp Estado",w:1080,h:1920,icon:"💬"},
  {label:"Facebook Post",w:1200,h:630,icon:"👍"},
  {label:"YouTube Miniatura",w:1280,h:720,icon:"▶️"},
];

function Card({children,style,onClick}){return <div onClick={onClick} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:16,padding:16,...style}}>{children}</div>;}
function Lbl({children}){return <div style={{fontSize:11,color:"rgba(255,255,255,0.45)",marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>{children}</div>;}
function Btn({onClick,disabled,children,style}){return <button onClick={onClick} disabled={disabled} style={{padding:"12px 20px",borderRadius:12,border:"none",background:disabled?"rgba(255,255,255,0.1)":"linear-gradient(135deg,#00c9a7,#00b4db)",color:disabled?"rgba(255,255,255,0.3)":"#fff",fontWeight:700,fontSize:14,cursor:disabled?"not-allowed":"pointer",width:"100%",...style}}>{children}</button>;}

function App(){
  const [tab,setTab]=useState(0);
  const [step,setStep]=useState(0);
  const [files,setFiles]=useState([]);
  const [userText,setUserText]=useState("");
  const [filter,setFilter]=useState("none");
  const [format,setFormat]=useState("1/1");
  const [textOverlay,setTextOverlay]=useState("");
  const [overlayColor,setOverlayColor]=useState("#ffffff");
  const [overlaySize,setOverlaySize]=useState(24);
  const [overlayFont,setOverlayFont]=useState("system-ui");
  const [copy,setCopy]=useState("");
  const [hashtags,setHashtags]=useState([]);
  const [selTags,setSelTags]=useState([]);
  const [tone,setTone]=useState("profesional");
  const [platform,setPlatform]=useState("instagram");
  const [mood,setMood]=useState("Energética 🔥");
  const [dragging,setDragging]=useState(false);
  const [loadingCopy,setLoadingCopy]=useState(false);
  const [loadingIdeas,setLoadingIdeas]=useState(false);
  const [calItems,setCalItems]=useState({});
  const [calDay,setCalDay]=useState(null);
  const [calNote,setCalNote]=useState("");
  const [calTipo,setCalTipo]=useState("📸 Foto");
  const [ideas,setIdeas]=useState([]);
  const [ideasTopic,setIdeasTopic]=useState("");
  const [history,setHistory]=useState(()=>{try{return JSON.parse(localStorage.getItem("ccs_history")||"[]");}catch{return [];}});
  const [copied,setCopied]=useState(false);
  const [igTime,setIgTime]=useState(()=>localStorage.getItem("ccs_ig_time")||"18:00");
  const [waTime,setWaTime]=useState(()=>localStorage.getItem("ccs_wa_time")||"08:00");
  const [showConfig,setShowConfig]=useState(false);
  const [productos,setProductos]=useState(()=>{try{return JSON.parse(localStorage.getItem("ccs_productos")||"[]");}catch{return [];}});
  const [showAddProd,setShowAddProd]=useState(false);
  const [editIdx,setEditIdx]=useState(null);
  const [prodForm,setProdForm]=useState({nombre:"",descripcion:"",precio:"",mostrarPrecio:true,categoria:"🌱 Producto",emoji:"🌱"});
  // Diseño
  const [designTab,setDesignTab]=useState(0); // 0=redimensionar, 1=collage, 2=tipografias
  const [resizeImg,setResizeImg]=useState(null);
  const [resizeSize,setResizeSize]=useState(SOCIAL_SIZES[0]);
  const [resizeResult,setResizeResult]=useState(null);
  const [collageImgs,setCollageImgs]=useState([]);
  const [collageLayout,setCollageLayout]=useState("2x2");
  const [collageResult,setCollageResult]=useState(null);
  const [typoText,setTypoText]=useState("Huerta Agroecológica");
  const [typoColor,setTypoColor]=useState("#00c9a7");
  const [typoBg,setTypoBg]=useState("#0a0a0a");
  const [typoSize,setTypoSize]=useState(40);
  const fileRef=useRef();
  const resizeRef=useRef();
  const collageRef=useRef();
  const canvasRef=useRef();

  const onDrop=useCallback(e=>{
    e.preventDefault();setDragging(false);
    const d=Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith("image/")||f.type.startsWith("video/"));
    if(d.length)setFiles(p=>[...p,...d.map(f=>({file:f,url:URL.createObjectURL(f)}))]);
  },[]);
  const onFileChange=e=>{
    const s=Array.from(e.target.files).filter(f=>f.type.startsWith("image/")||f.type.startsWith("video/"));
    if(s.length)setFiles(p=>[...p,...s.map(f=>({file:f,url:URL.createObjectURL(f)}))]);
    e.target.value="";
  };

  const generateCopy=async()=>{
    setLoadingCopy(true);setCopy("");setHashtags([]);setSelTags([]);
    const prompt=`Sos un experto en marketing para una Huerta Agroecológica. Generá un copy para ${platform} con tono ${TONES[tone]||"profesional"}. ${userText?`Contexto: "${userText}".`:""} SOLO JSON sin markdown: {"copy":"...","hashtags":["#uno",...]} con 12 hashtags de huerta y agroecología.`;
    try{
      const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})});
      const data=await res.json();
      const text=data.candidates?.[0]?.content?.parts?.[0]?.text||"";
      const parsed=JSON.parse(text.replace(/```json|```/g,"").trim());
      setCopy(parsed.copy||"");setHashtags(parsed.hashtags||[]);setSelTags((parsed.hashtags||[]).slice(0,6));
    }catch{
      const pool=COPIES[tone]||COPIES.profesional;
      setCopy(pool[Math.floor(Math.random()*pool.length)]+(userText?"\n\n"+userText:""));
      setHashtags(HASHTAGS_BASE);setSelTags(HASHTAGS_BASE.slice(0,6));
    }
    setLoadingCopy(false);
  };

  const generateIdeas=async()=>{
    setLoadingIdeas(true);setIdeas([]);
    const prompt=`Estratega de redes para Huerta Agroecológica Siglo XXI (productos, elaboraciones, talleres). Generá 8 ideas de contenido. ${ideasTopic?`Tema: "${ideasTopic}".`:""} SOLO JSON: {"ideas":[{"titulo":"...","desc":"...","formato":"Reel|Imagen|Carrusel|Story","emoji":"..."},...]}`;
    try{
      const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})});
      const data=await res.json();
      const text=data.candidates?.[0]?.content?.parts?.[0]?.text||"";
      const parsed=JSON.parse(text.replace(/```json|```/g,"").trim());
      setIdeas(parsed.ideas||[]);
    }catch{
      setIdeas([
        {titulo:"Cosecha del día",desc:"Mostrá qué cosechaste hoy",formato:"Reel",emoji:"🥬"},
        {titulo:"Receta con mis productos",desc:"Preparación simple con ingredientes de la huerta",formato:"Reel",emoji:"🍳"},
        {titulo:"Tip agroecológico",desc:"Un consejo para cuidar la tierra",formato:"Imagen",emoji:"🌱"},
        {titulo:"Taller del mes",desc:"Presentá tu próximo taller",formato:"Carrusel",emoji:"📚"},
        {titulo:"Antes y después",desc:"Transformación de un espacio en huerta",formato:"Carrusel",emoji:"✨"},
        {titulo:"¿Sabías que...?",desc:"Dato curioso sobre agroecología",formato:"Imagen",emoji:"🤔"},
        {titulo:"Elaboración artesanal",desc:"Mostrá cómo preparás una elaboración",formato:"Reel",emoji:"🫙"},
        {titulo:"Testimonio de alumno",desc:"Experiencia de alguien que tomó tus talleres",formato:"Story",emoji:"⭐"},
      ]);
    }
    setLoadingIdeas(false);
  };

  // REDIMENSIONAR
  const handleResize=()=>{
    if(!resizeImg)return;
    const canvas=document.createElement("canvas");
    canvas.width=resizeSize.w; canvas.height=resizeSize.h;
    const ctx=canvas.getContext("2d");
    const img=new Image();
    img.onload=()=>{
      ctx.fillStyle="#000"; ctx.fillRect(0,0,canvas.width,canvas.height);
      const scale=Math.max(canvas.width/img.width,canvas.height/img.height);
      const x=(canvas.width-img.width*scale)/2;
      const y=(canvas.height-img.height*scale)/2;
      ctx.drawImage(img,x,y,img.width*scale,img.height*scale);
      setResizeResult(canvas.toDataURL("image/jpeg",0.92));
    };
    img.src=resizeImg;
  };

  // COLLAGE
  const handleCollage=()=>{
    if(collageImgs.length<2)return;
    const canvas=document.createElement("canvas");
    const size=1080; canvas.width=size; canvas.height=size;
    const ctx=canvas.getContext("2d");
    ctx.fillStyle="#0a0a0a"; ctx.fillRect(0,0,size,size);
    const gap=8;
    const loadImg=(src)=>new Promise(res=>{const i=new Image();i.onload=()=>res(i);i.src=src;});
    const drawImg=(img,x,y,w,h)=>{
      const scale=Math.max(w/img.width,h/img.height);
      const sx=(img.width*scale-w)/2; const sy=(img.height*scale-h)/2;
      ctx.save(); ctx.beginPath(); ctx.rect(x,y,w,h); ctx.clip();
      ctx.drawImage(img,-sx+x,-sy+y,img.width*scale,img.height*scale);
      ctx.restore();
    };
    Promise.all(collageImgs.slice(0,4).map(u=>loadImg(u))).then(imgs=>{
      const half=(size-gap*3)/2;
      if(collageLayout==="2x2"){
        if(imgs[0])drawImg(imgs[0],gap,gap,half,half);
        if(imgs[1])drawImg(imgs[1],gap*2+half,gap,half,half);
        if(imgs[2])drawImg(imgs[2],gap,gap*2+half,half,half);
        if(imgs[3])drawImg(imgs[3],gap*2+half,gap*2+half,half,half);
      } else if(collageLayout==="1+2"){
        const bigH=(size-gap*2)*0.6; const smH=size-bigH-gap*3;
        if(imgs[0])drawImg(imgs[0],gap,gap,size-gap*2,bigH);
        if(imgs[1])drawImg(imgs[1],gap,bigH+gap*2,half,smH);
        if(imgs[2])drawImg(imgs[2],gap*2+half,bigH+gap*2,half,smH);
      } else {
        const w=(size-gap*4)/3;
        imgs.slice(0,3).forEach((img,i)=>{if(img)drawImg(img,gap+i*(w+gap),gap,w,size-gap*2);});
      }
      setCollageResult(canvas.toDataURL("image/jpeg",0.92));
    });
  };

  const copyToClipboard=text=>{navigator.clipboard.writeText(text).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});};
  const shareToWhatsApp=()=>{const t=encodeURIComponent(copy+(selTags.length?"\n\n"+selTags.join(" "):""));window.open(`https://wa.me/?text=${t}`,"_blank");};
  const shareToInstagram=()=>{copyToClipboard(copy+(selTags.length?"\n\n"+selTags.join(" "):""));alert("✅ Texto copiado.\n\nAbrí Instagram, creá tu publicación y pegá el texto.");};

  const saveToHistory=()=>{
    const item={id:Date.now(),date:new Date().toLocaleDateString("es-AR"),platform,copy,hashtags:selTags,filter,imgUrl:files[0]?.url||null};
    const updated=[item,...history];
    setHistory(updated);
    try{localStorage.setItem("ccs_history",JSON.stringify(updated));}catch{}
    setStep(0);setFiles([]);setCopy("");setHashtags([]);setUserText("");setFilter("none");setTextOverlay("");
    setTab(6);
  };
  const deleteHistory=i=>{const u=history.filter((_,idx)=>idx!==i);setHistory(u);try{localStorage.setItem("ccs_history",JSON.stringify(u));}catch{}};
  const saveConfig=()=>{localStorage.setItem("ccs_ig_time",igTime);localStorage.setItem("ccs_wa_time",waTime);setShowConfig(false);};
  const saveProd=()=>{
    const updated=editIdx!==null?productos.map((p,i)=>i===editIdx?prodForm:p):[...productos,prodForm];
    setProductos(updated);try{localStorage.setItem("ccs_productos",JSON.stringify(updated));}catch{}
    setShowAddProd(false);setEditIdx(null);setProdForm({nombre:"",descripcion:"",precio:"",mostrarPrecio:true,categoria:"🌱 Producto",emoji:"🌱"});
  };
  const deleteProd=i=>{const u=productos.filter((_,idx)=>idx!==i);setProductos(u);try{localStorage.setItem("ccs_productos",JSON.stringify(u));}catch{}};

  const previewImg=files.find(f=>f.file?.type?.startsWith("image/"))?.url;
  const fullText=copy+(selTags.length?"\n\n"+selTags.join(" "):"");

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#0a0a0a,#0d1f1a,#0a1628)",display:"flex",flexDirection:"column"}}>

      {/* Config Modal */}
      {showConfig&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.8)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#0d1f1a",borderRadius:20,padding:24,width:"100%",maxWidth:340,border:"1px solid rgba(0,201,167,0.3)"}}>
            <h3 style={{margin:"0 0 16px"}}>⚙️ Configuración</h3>
            <div style={{marginBottom:14}}><Lbl>📸 Horario Instagram</Lbl><input type="time" value={igTime} onChange={e=>setIgTime(e.target.value)} style={{width:"100%",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(0,201,167,0.3)",borderRadius:10,padding:"10px 14px",color:"#fff",fontSize:15,boxSizing:"border-box"}}/></div>
            <div style={{marginBottom:20}}><Lbl>💬 Horario WhatsApp</Lbl><input type="time" value={waTime} onChange={e=>setWaTime(e.target.value)} style={{width:"100%",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(0,201,167,0.3)",borderRadius:10,padding:"10px 14px",color:"#fff",fontSize:15,boxSizing:"border-box"}}/></div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setShowConfig(false)} style={{flex:1,padding:"12px",borderRadius:12,border:"1px solid rgba(255,255,255,0.2)",background:"transparent",color:"#fff",fontSize:14,cursor:"pointer"}}>Cancelar</button>
              <Btn onClick={saveConfig} style={{flex:2}}>💾 Guardar</Btn>
            </div>
          </div>
        </div>
      )}

      {/* Add Producto Modal */}
      {showAddProd&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.85)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16,overflowY:"auto"}}>
          <div style={{background:"#0d1f1a",borderRadius:20,padding:24,width:"100%",maxWidth:380,border:"1px solid rgba(0,201,167,0.3)"}}>
            <h3 style={{margin:"0 0 16px"}}>{editIdx!==null?"✏️ Editar":"➕ Agregar"} producto/servicio</h3>
            <div style={{marginBottom:10}}><Lbl>Categoría</Lbl><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{CATEGORIAS.map(c=><button key={c} onClick={()=>setProdForm(p=>({...p,categoria:c,emoji:c[0]}))} style={{padding:"6px 10px",borderRadius:20,border:`1px solid ${prodForm.categoria===c?"#00c9a7":"rgba(255,255,255,0.2)"}`,background:prodForm.categoria===c?"rgba(0,201,167,0.2)":"transparent",color:prodForm.categoria===c?"#00c9a7":"rgba(255,255,255,0.6)",fontSize:12,cursor:"pointer"}}>{c}</button>)}</div></div>
            <div style={{marginBottom:10}}><Lbl>Nombre</Lbl><input value={prodForm.nombre} onChange={e=>setProdForm(p=>({...p,nombre:e.target.value}))} placeholder="Ej: Lechuga orgánica..." style={{width:"100%",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(0,201,167,0.2)",borderRadius:8,padding:"10px",color:"#fff",fontSize:13,boxSizing:"border-box"}}/></div>
            <div style={{marginBottom:10}}><Lbl>Descripción</Lbl><textarea value={prodForm.descripcion} onChange={e=>setProdForm(p=>({...p,descripcion:e.target.value}))} placeholder="Describí brevemente..." style={{width:"100%",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(0,201,167,0.2)",borderRadius:8,padding:"10px",color:"#fff",fontSize:13,boxSizing:"border-box",minHeight:60,resize:"vertical"}}/></div>
            <div style={{marginBottom:10,display:"flex",gap:10,alignItems:"flex-end"}}>
              <div style={{flex:1}}><Lbl>Precio (opcional)</Lbl><input value={prodForm.precio} onChange={e=>setProdForm(p=>({...p,precio:e.target.value}))} placeholder="Ej: $1500" style={{width:"100%",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(0,201,167,0.2)",borderRadius:8,padding:"10px",color:"#fff",fontSize:13,boxSizing:"border-box"}}/></div>
              <div><Lbl>Mostrar precio</Lbl><button onClick={()=>setProdForm(p=>({...p,mostrarPrecio:!p.mostrarPrecio}))} style={{padding:"8px 14px",borderRadius:8,border:`1px solid ${prodForm.mostrarPrecio?"#00c9a7":"rgba(255,255,255,0.2)"}`,background:prodForm.mostrarPrecio?"rgba(0,201,167,0.2)":"transparent",color:prodForm.mostrarPrecio?"#00c9a7":"rgba(255,255,255,0.5)",fontSize:12,cursor:"pointer"}}>{prodForm.mostrarPrecio?"✅ Sí":"❌ No"}</button></div>
            </div>

                      <Btn style={{background:"linear-gradient(135deg,#43e97b,#38f9d7)"}}>⬇️ Descargar collage</Btn>
                    </a>
                  </Card>
                )}
              </div>

                    <div style={{flex:1}}><Lbl>Color texto</Lbl><input type="color" value={typoColor} onChange={e=>setTypoColor(e.target.value)} style={{width:"100%",height:36,borderRadius:8,border:"none"}}/></div>

                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {FONTS.map((f,i)=>(
                    <div key={f} style={{background:"rgba(255,255,255,0.05)",border:`1px solid ${overlayFont===f?"#00c9a7":"rgba(255,255,255,0.1)"}`,borderRadius:12,padding:"14px 16px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}} onClick={()=>setOverlayFont(f)}>
                      <span style={{fontFamily:f,fontSize:typoSize>40?24:typoSize,color:typoColor,background:typoBg,padding:"4px 10px",borderRadius:6,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{typoText||"Tu texto acá"}</span>
                      <div style={{marginLeft:10,flexShrink:0}}>
                        <div style={{fontSize:10,color:"rgba(255,255,255,0.4)",marginBottom:2}}>{FONT_LABELS[i]}</div>

                      </div>
                    </div>

                </div>
                <Card style={{marginTop:14,textAlign:"center",border:"1px solid rgba(0,201,167,0.2)"}}>
                  <Lbl>✅ Tipografía seleccionada</Lbl>

            {step===0&&(
              <div>

                </div>
                <Card style={{marginBottom:14}}>
                  <Lbl>Texto sobre la imagen</Lbl>
                  <input value={textOverlay} onChange={e=>setTextOverlay(e.target.value)} placeholder="Ej: 🌱 Cosecha de hoy" style={{width:"100%",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(0,201,167,0.2)",borderRadius:8,padding:10,color:"#fff",fontSize:14,boxSizing:"border-box",marginBottom:10}}/>

                    <div style={{flex:1}}><Lbl>Color</Lbl><input type="color" value={overlayColor} onChange={e=>setOverlayColor(e.target.value)} style={{width:"100%",height:36,borderRadius:8,border:"none"}}/></div>

                </div>
                <Btn onClick={generateCopy} disabled={loadingCopy} style={{background:loadingCopy?"rgba(255,255,255,0.1)":"linear-gradient(135deg,#54a0ff,#5f27cd)",marginBottom:14}}>{loadingCopy?"🤖 Generando...":"🤖 Generar Copy + Hashtags"}</Btn>
                {copy&&<><Card style={{marginBottom:12}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}><Lbl>Descripción</Lbl><button onClick={()=>copyToClipboard(copy)} style={{background:"rgba(0,201,167,0.2)",border:"none",color:"#00c9a7",borderRadius:6,padding:"3px 10px",fontSize:11,cursor:"pointer"}}>Copiar</button></div><textarea value={copy} onChange={e=>setCopy(e.target.value)} style={{width:"100%",background:"transparent",border:"none",color:"#fff",fontSize:13,lineHeight:1.6,resize:"vertical",minHeight:80,boxSizing:"border-box"}}/></Card><Card style={{marginBottom:14}}><Lbl>Hashtags</Lbl><div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:6}}>{hashtags.map(h=><button key={h} onClick={()=>setSelTags(p=>p.includes(h)?p.filter(x=>x!==h):[...p,h])} style={{padding:"4px 10px",borderRadius:20,border:`1px solid ${selTags.includes(h)?"#00c9a7":"rgba(255,255,255,0.2)"}`,background:selTags.includes(h)?"rgba(0,201,167,0.2)":"transparent",color:selTags.includes(h)?"#00c9a7":"rgba(255,255,255,0.5)",fontSize:12,cursor:"pointer"}}>{h}</button>)}</div></Card></>}
                <div style={{display:"flex",gap:10}}><Btn onClick={()=>setStep(2)} style={{background:"rgba(255,255,255,0.1)",flex:1}}>← Atrás</Btn><Btn onClick={()=>setStep(4)} disabled={!copy} style={{flex:2}}>Exportar →</Btn></div>
              </div>
            )}
            {step===4&&(
              <div>
                <Card style={{marginBottom:14}}>
                  <Lbl>Vista previa final</Lbl>
                  <div style={{position:"relative",borderRadius:12,overflow:"hidden",aspectRatio:format,background:"#111",maxWidth:220,margin:"10px auto"}}>
                    {previewImg&&<img src={previewImg} style={{width:"100%",height:"100%",objectFit:"cover",filter:filter==="none"?"none":filter}}/>}
                    {textOverlay&&<div style={{position:"absolute",bottom:16,left:0,right:0,textAlign:"center",color:overlayColor,fontSize:Math.max(overlaySize*0.6,12),fontWeight:800,fontFamily:overlayFont,textShadow:"0 2px 8px rgba(0,0,0,0.8)",padding:"0 10px"}}>{textOverlay}</div>}
                  </div>
                  <div style={{fontSize:13,lineHeight:1.6,color:"rgba(255,255,255,0.8)",marginTop:10}}>{copy}</div>
                  {selTags.length>0&&<div style={{fontSize:12,color:"#00c9a7",marginTop:6}}>{selTags.join(" ")}</div>}
                </Card>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
                  <button onClick={shareToInstagram} style={{padding:"12px 8px",borderRadius:12,border:"none",background:"linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>📸 Instagram</button>
                  <button onClick={shareToWhatsApp} style={{padding:"12px 8px",borderRadius:12,border:"none",background:"linear-gradient(135deg,#25d366,#128c7e)",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>💬 WhatsApp</button>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
                  <button onClick={()=>copyToClipboard(fullText)} style={{padding:"12px 8px",borderRadius:12,border:"none",background:copied?"rgba(0,201,167,0.3)":"linear-gradient(135deg,#667eea,#764ba2)",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>{copied?"✅ Copiado!":"📋 Copiar todo"}</button>
                  {previewImg&&<a href={previewImg} download="mi-contenido.jpg" style={{textDecoration:"none"}}><button style={{width:"100%",padding:"12px 8px",borderRadius:12,border:"none",background:"linear-gradient(135deg,#43e97b,#38f9d7)",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>⬇️ Descargar</button></a>}
                </div>
                <Btn onClick={saveToHistory} style={{marginBottom:10}}>💾 Guardar en historial</Btn>
                <Btn onClick={()=>{setStep(0);setFiles([]);setCopy("");setHashtags([]);setUserText("");setFilter("none");setTextOverlay("");}} style={{background:"rgba(255,255,255,0.08)"}}>🔄 Nuevo contenido</Btn>
              </div>
            )}
          </div>
        )}

        {/* CALENDARIO */}
        {tab===3&&(
          <div>
            <h2 style={{textAlign:"center",marginBottom:16,fontSize:18}}>📅 Planificador semanal</h2>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:5,marginBottom:20}}>{DAYS.map((d,i)=>{const has=calItems[i];return <div key={d} onClick={()=>{setCalDay(calDay===i?null:i);setCalNote(has?.nota||"");setCalTipo(has?.tipo||"📸 Foto");}} style={{background:calDay===i?"rgba(0,201,167,0.2)":has?"rgba(84,160,255,0.12)":"rgba(255,255,255,0.05)",border:`1px solid ${calDay===i?"#00c9a7":has?"#54a0ff":"rgba(255,255,255,0.1)"}`,borderRadius:10,padding:"10px 2px",textAlign:"center",cursor:"pointer"}}><div style={{fontSize:10,color:"rgba(255,255,255,0.5)",marginBottom:4}}>{d}</div><div style={{fontSize:16}}>{has?has.emoji||"📌":"+"}</div>{has&&<div style={{fontSize:8,color:"#54a0ff",marginTop:2}}>{has.tipo?.split(" ")[1]||""}</div>}</div>;})}</div>
            {calDay!==null&&<Card style={{marginBottom:16,border:"1px solid rgba(0,201,167,0.2)"}}><Lbl>Publicación del {DAYS[calDay]}</Lbl><input value={calNote} onChange={e=>setCalNote(e.target.value)} placeholder="¿Qué vas a publicar?" style={{width:"100%",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(0,201,167,0.2)",borderRadius:8,padding:10,color:"#fff",fontSize:13,boxSizing:"border-box",marginBottom:10}}/><div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>{["📸 Foto","🎬 Reel","📊 Carrusel","📖 Story"].map(t=><button key={t} onClick={()=>setCalTipo(t)} style={{padding:"5px 10px",borderRadius:20,border:`1px solid ${calTipo===t?"#00c9a7":"rgba(255,255,255,0.2)"}`,background:calTipo===t?"rgba(0,201,167,0.2)":"transparent",color:calTipo===t?"#00c9a7":"rgba(255,255,255,0.6)",fontSize:12,cursor:"pointer"}}>{t}</button>)}</div><div style={{display:"flex",gap:8}}><Btn onClick={()=>{setCalItems(p=>({...p,[calDay]:{nota:calNote,tipo:calTipo,emoji:calTipo[0]}}));setCalDay(null);}} style={{flex:2}}>💾 Guardar</Btn><Btn onClick={()=>{setCalItems(p=>{const n={...p};delete n[calDay];return n;});setCalDay(null);}} style={{background:"rgba(255,87,87,0.3)",flex:1}}>🗑️</Btn></div></Card>}
            {Object.keys(calItems).length>0&&<Card style={{border:"1px solid rgba(0,201,167,0.15)"}}><Lbl>Resumen</Lbl>{Object.entries(calItems).sort(([a],[b])=>a-b).map(([d,v])=><div key={d} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}><div style={{width:34,height:34,borderRadius:10,background:"rgba(0,201,167,0.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>{v.emoji}</div><div><div style={{fontWeight:600,fontSize:13}}>{DAYS[d]}</div><div style={{fontSize:12,color:"rgba(255,255,255,0.5)"}}>{v.tipo} {v.nota&&`· ${v.nota}`}</div></div></div>)}</Card>}
          </div>
        )}

        {/* IDEAS */}
        {tab===4&&(
          <div>
            <h2 style={{textAlign:"center",marginBottom:8,fontSize:18}}>💡 Ideas para tu Huerta</h2>
            <p style={{textAlign:"center",color:"rgba(255,255,255,0.5)",fontSize:13,marginBottom:16}}>La IA genera ideas personalizadas</p>
            <div style={{display:"flex",gap:10,marginBottom:14}}>
              <input value={ideasTopic} onChange={e=>setIdeasTopic(e.target.value)} onKeyDown={e=>e.key==="Enter"&&generateIdeas()} placeholder="Tema (ej: tomates, taller de compostaje...)" style={{flex:1,background:"rgba(255,255,255,0.07)",border:"1px solid rgba(0,201,167,0.2)",borderRadius:10,padding:"10px 14px",color:"#fff",fontSize:13}}/>
              <button onClick={generateIdeas} disabled={loadingIdeas} style={{padding:"10px 18px",borderRadius:10,border:"none",background:loadingIdeas?"rgba(255,255,255,0.1)":"linear-gradient(135deg,#00c9a7,#00b4db)",color:"#fff",fontWeight:700,fontSize:14,cursor:loadingIdeas?"not-allowed":"pointer",whiteSpace:"nowrap"}}>{loadingIdeas?"⏳":"✨ Generar"}</button>
            </div>
            {ideas.length>0?<div style={{display:"flex",flexDirection:"column",gap:10}}>{ideas.map((idea,i)=><Card key={i} style={{display:"flex",gap:12,alignItems:"flex-start",border:"1px solid rgba(0,201,167,0.1)"}}><div style={{fontSize:26,flexShrink:0}}>{idea.emoji}</div><div style={{flex:1}}><div style={{fontWeight:700,fontSize:14,marginBottom:4}}>{idea.titulo}</div><div style={{fontSize:12,color:"rgba(255,255,255,0.6)",marginBottom:6}}>{idea.desc}</div><span style={{fontSize:10,padding:"3px 10px",borderRadius:20,background:"rgba(0,201,167,0.2)",color:"#00c9a7"}}>{idea.formato}</span></div><button onClick={()=>{setUserText(idea.desc);setTab(1);setStep(0);}} style={{background:"rgba(0,201,167,0.2)",border:"none",color:"#00c9a7",borderRadius:8,padding:"6px 10px",fontSize:11,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>Usar →</button></Card>)}</div>:<div style={{textAlign:"center",padding:40,color:"rgba(255,255,255,0.3)"}}><div style={{fontSize:40,marginBottom:12}}>🌱</div><div>Tocá Generar para obtener ideas</div></div>}
          </div>
        )}

        {/* PRECIOS */}
        {tab===5&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <h2 style={{fontSize:18}}>🏷️ Productos y Servicios</h2>
              <button onClick={()=>{setShowAddProd(true);setEditIdx(null);setProdForm({nombre:"",descripcion:"",precio:"",mostrarPrecio:true,categoria:"🌱 Producto",emoji:"🌱"});}} style={{background:"linear-gradient(135deg,#00c9a7,#00b4db)",border:"none",color:"#fff",borderRadius:10,padding:"8px 14px",fontSize:13,fontWeight:700,cursor:"pointer"}}>+ Agregar</button>
            </div>
            {productos.length===0?<div style={{textAlign:"center",padding:40,color:"rgba(255,255,255,0.3)"}}><div style={{fontSize:40,marginBottom:12}}>🌿</div><div style={{marginBottom:16}}>Todavía no agregaste productos</div><button onClick={()=>setShowAddProd(true)} style={{padding:"10px 24px",borderRadius:12,border:"none",background:"linear-gradient(135deg,#00c9a7,#00b4db)",color:"#fff",fontWeight:700,cursor:"pointer"}}>+ Agregar primero</button></div>:(
              <div>{CATEGORIAS.map(cat=>{const items=productos.filter(p=>p.categoria===cat);if(items.length===0)return null;return<div key={cat} style={{marginBottom:20}}><div style={{fontSize:13,fontWeight:700,color:catBorders[cat]||"#00c9a7",marginBottom:8,padding:"4px 0",borderBottom:`1px solid ${catBorders[cat]||"#00c9a7"}30`}}>{cat}</div><div style={{display:"flex",flexDirection:"column",gap:8}}>{items.map((prod,idx)=>{const realIdx=productos.indexOf(prod);return<Card key={idx} style={{background:catColors[cat]||"rgba(0,201,167,0.1)",border:`1px solid ${catBorders[cat]||"#00c9a7"}30`}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}><div style={{flex:1}}><div style={{fontWeight:700,fontSize:14,marginBottom:3}}>{prod.emoji} {prod.nombre}</div>{prod.descripcion&&<div style={{fontSize:12,color:"rgba(255,255,255,0.6)",marginBottom:4,lineHeight:1.4}}>{prod.descripcion}</div>}{prod.mostrarPrecio&&prod.precio&&<div style={{fontSize:14,fontWeight:700,color:catBorders[cat]||"#00c9a7"}}>{prod.precio}</div>}{!prod.mostrarPrecio&&<div style={{fontSize:11,color:"rgba(255,255,255,0.3)",fontStyle:"italic"}}>Precio a consultar</div>}</div><div style={{display:"flex",gap:6,flexShrink:0}}><button onClick={()=>{setEditIdx(realIdx);setProdForm({...prod});setShowAddProd(true);}} style={{background:"rgba(255,255,255,0.1)",border:"none",color:"#fff",borderRadius:8,padding:"5px 10px",fontSize:12,cursor:"pointer"}}>✏️</button><button onClick={()=>deleteProd(realIdx)} style={{background:"rgba(255,87,87,0.2)",border:"none",color:"#ff5757",borderRadius:8,padding:"5px 10px",fontSize:12,cursor:"pointer"}}>🗑️</button></div></div></Card>;})}</div></div>;})} </div>
            )}
          </div>
        )}

        {/* HISTORIAL */}
        {tab===6&&(
          <div>
            <h2 style={{textAlign:"center",marginBottom:16,fontSize:18}}>🕐 Historial</h2>
            {history.length===0?<div style={{textAlign:"center",padding:40,color:"rgba(255,255,255,0.3)"}}><div style={{fontSize:40,marginBottom:12}}>📂</div><div style={{marginBottom:16}}>Todavía no guardaste contenido</div><button onClick={()=>setTab(1)} style={{padding:"10px 24px",borderRadius:12,border:"none",background:"linear-gradient(135deg,#00c9a7,#00b4db)",color:"#fff",fontWeight:700,cursor:"pointer"}}>Crear contenido</button></div>:(
              <div style={{display:"flex",flexDirection:"column",gap:12}}>{history.map((h,i)=><Card key={h.id} style={{display:"flex",gap:12,border:"1px solid rgba(0,201,167,0.1)"}}>{h.imgUrl?<img src={h.imgUrl} style={{width:56,height:56,borderRadius:10,objectFit:"cover",flexShrink:0}}/>:<div style={{width:56,height:56,borderRadius:10,background:"rgba(0,201,167,0.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>📝</div>}<div style={{flex:1,minWidth:0}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}><span style={{fontSize:11,background:"rgba(0,201,167,0.2)",color:"#00c9a7",padding:"2px 8px",borderRadius:10}}>{h.platform}</span><span style={{fontSize:10,color:"rgba(255,255,255,0.35)"}}>{h.date}</span></div><div style={{fontSize:12,color:"rgba(255,255,255,0.7)",lineHeight:1.4,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{h.copy}</div><div style={{display:"flex",gap:6,marginTop:6}}><button onClick={()=>copyToClipboard(h.copy+"\n\n"+h.hashtags.join(" "))} style={{background:"rgba(0,201,167,0.15)",border:"none",color:"#00c9a7",borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer"}}>Copiar</button><button onClick={()=>deleteHistory(i)} style={{background:"rgba(255,87,87,0.2)",border:"none",color:"#ff5757",borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer"}}>Borrar</button></div></div></Card>)}</div>
            )}
          </div>
        )}

      </div>
    </div>
  );
}
ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
<script>if("serviceWorker" in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("/sw.js").catch(e=>console.log("SW:",e));});}</script>
</body>
</html>
