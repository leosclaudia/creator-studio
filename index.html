<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Creator Studio</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#00c9a7" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CreatorStudio" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#0a0a0a;color:#fff;font-family:system-ui,sans-serif;}
    select option{background:#1a1a2e;}
    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-thumb{background:rgba(0,201,167,0.4);border-radius:4px;}
    input[type=range]{accent-color:#00c9a7;}
    textarea,input,select{outline:none;font-family:inherit;}
    .rainbow{background:linear-gradient(135deg,#ff6b6b,#feca57,#48dbfb,#ff9ff3,#54a0ff,#00c9a7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:800;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useCallback}=React;
const GEMINI_KEY="AIzaSyALbDopwj32v53odOvgML4c5vgJCBLefgo";
const TABS=["🏠","📤","📅","💡","🏷️","🕐"];
const TAB_LABELS=["Inicio","Crear","Calendario","Ideas","Precios","Historial"];
const DAYS=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
const FILTERS=[{id:"none",label:"Original"},{id:"brightness(1.2) contrast(1.1)",label:"Vibrante"},{id:"grayscale(1)",label:"B&N"},{id:"saturate(1.8)",label:"Saturado"},{id:"contrast(1.3) brightness(0.9)",label:"Dramático"},{id:"sepia(0.6)",label:"Vintage"}];
const FORMATS=[{id:"1/1",label:"Feed",size:"1080x1080",icon:"⬛"},{id:"9/16",label:"Reel",size:"1080x1920",icon:"📱"},{id:"16/9",label:"Portada",size:"1200x630",icon:"🖥️"},{id:"4/5",label:"Portrait",size:"1080x1350",icon:"📸"}];
const MOODS=["Energética 🔥","Tranquila 🌊","Romántica 💕","Motivacional 💪","Divertida 😂"];
const STEPS_CREATE=["📤 Subir","✨ Mejorar","🖊️ Texto","✍️ Copy","📲 Exportar"];
const TONES={
  profesional:"profesional y serio",
  divertido:"divertido y con humor",
  inspiracional:"inspiracional y motivador",
  cercano:"cercano y empático",
  informativo:"informativo y educativo",
  urgente:"urgente y llamativo",
  formal:"formal y corporativo",
  juvenil:"juvenil y moderno con emojis",
  romantico:"romántico y emocional",
};
const COPIES={
  profesional:["Compartimos con orgullo nuestro trabajo. Cada detalle fue pensado para vos. 💼✨","La excelencia no es un accidente, es el resultado del esfuerzo constante. 🎯"],
  divertido:["¡Esto es lo que pasa cuando nos ponemos creativos! 😂🎉 ¿Te copa?","Modo creatividad activada al 100% 🔥😜"],
  inspiracional:["Cada día es una nueva oportunidad para brillar. ✨🌟","Los sueños no tienen fecha de vencimiento. 💫"],
  cercano:["Queremos compartir este momento especial con vos 🥰","Sin ustedes nada de esto tendría sentido. ❤️"],
  informativo:["Te contamos todo lo que necesitás saber 👇","Información importante que no podés perderte 📌"],
  urgente:["⚠️ ¡ÚLTIMAS HORAS! No dejes pasar esta oportunidad.","🚨 Quedan muy pocos lugares. ¡No te quedés afuera!"],
  formal:["Nos complace presentarles nuestra propuesta de valor. 🏢","Con profesionalismo y compromiso, ponemos a su disposición nuestros servicios. 📋"],
  juvenil:["¡Esto está re bueno y no podíamos no compartirlo! 🔥✨ dale RT si te suma","vibes de productividad total 💅 esto lo necesitabas en tu vida fr fr 🫶"],
  romantico:["Hay cosas que el corazón siente antes de que las palabras lleguen... 💕","Porque los momentos más especiales merecen ser compartidos. 🌹✨"],
};
const HASHTAGS_BASE=["#huerta","#agroecología","#orgánico","#natural","#sustentable","#agroecológico","#huertaurbana","#alimentosaludable","#vidanatural","#campo","#argentina","#productosnaturales"];

function Card({children,style,onClick}){return <div onClick={onClick} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:16,padding:16,...style}}>{children}</div>;}
function Lbl({children}){return <div style={{fontSize:11,color:"rgba(255,255,255,0.45)",marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>{children}</div>;}
function Btn({onClick,disabled,children,style}){return <button onClick={onClick} disabled={disabled} style={{padding:"12px 20px",borderRadius:12,border:"none",background:disabled?"rgba(255,255,255,0.1)":"linear-gradient(135deg,#00c9a7,#00b4db)",color:disabled?"rgba(255,255,255,0.3)":"#fff",fontWeight:700,fontSize:14,cursor:disabled?"not-allowed":"pointer",width:"100%",...style}}>{children}</button>;}

function App(){
  const [tab,setTab]=useState(0);
  const [step,setStep]=useState(0);
  const [files,setFiles]=useState([]);
  const [userText,setUserText]=useState("");
  const [filter,setFilter]=useState("none");
  const [format,setFormat]=useState("1/1");
  const [textOverlay,setTextOverlay]=useState("");
  const [overlayColor,setOverlayColor]=useState("#ffffff");
  const [overlaySize,setOverlaySize]=useState(24);
  const [copy,setCopy]=useState("");
  const [hashtags,setHashtags]=useState([]);
  const [selTags,setSelTags]=useState([]);
  const [tone,setTone]=useState("profesional");
  const [platform,setPlatform]=useState("instagram");
  const [mood,setMood]=useState("Energética 🔥");
  const [dragging,setDragging]=useState(false);
  const [loadingCopy,setLoadingCopy]=useState(false);
  const [loadingIdeas,setLoadingIdeas]=useState(false);
  const [calItems,setCalItems]=useState({});
  const [calDay,setCalDay]=useState(null);
  const [calNote,setCalNote]=useState("");
  const [calTipo,setCalTipo]=useState("📸 Foto");
  const [ideas,setIdeas]=useState([]);
  const [ideasTopic,setIdeasTopic]=useState("");
  const [history,setHistory]=useState(()=>{try{return JSON.parse(localStorage.getItem("ccs_history")||"[]");}catch{return [];}});
  const [copied,setCopied]=useState(false);
  const [igTime,setIgTime]=useState(()=>localStorage.getItem("ccs_ig_time")||"18:00");
  const [waTime,setWaTime]=useState(()=>localStorage.getItem("ccs_wa_time")||"08:00");
  const [showConfig,setShowConfig]=useState(false);
  // Precios
  const [productos,setProductos]=useState(()=>{try{return JSON.parse(localStorage.getItem("ccs_productos")||"[]");}catch{return [];}});
  const [showAddProd,setShowAddProd]=useState(false);
  const [editIdx,setEditIdx]=useState(null);
  const [prodForm,setProdForm]=useState({nombre:"",descripcion:"",precio:"",mostrarPrecio:true,categoria:"Producto",emoji:"🌱"});
  const fileRef=useRef();

  const CATEGORIAS=["🌱 Producto","🥗 Elaboración","📚 Enseñanza","🌿 Otro"];

  const onDrop=useCallback(e=>{
    e.preventDefault();setDragging(false);
    const d=Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith("image/")||f.type.startsWith("video/"));
    if(d.length)setFiles(p=>[...p,...d.map(f=>({file:f,url:URL.createObjectURL(f)}))]);
  },[]);

  const onFileChange=e=>{
    const s=Array.from(e.target.files).filter(f=>f.type.startsWith("image/")||f.type.startsWith("video/"));
    if(s.length)setFiles(p=>[...p,...s.map(f=>({file:f,url:URL.createObjectURL(f)}))]);
    e.target.value="";
  };

  const generateCopy=async()=>{
    setLoadingCopy(true);setCopy("");setHashtags([]);setSelTags([]);
    const toneDesc=TONES[tone]||"profesional";
    const prompt=`Sos un experto en marketing digital para una Huerta Agroecológica. Generá un copy para ${platform} con tono ${toneDesc}. ${userText?`Contexto: "${userText}".`:""} Respondé SOLO con JSON sin markdown: {"copy":"...","hashtags":["#uno","#dos",...]} con 12 hashtags en español relacionados con huerta, agroecología y naturaleza.`;
    try{
      const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})});
      const data=await res.json();
      const text=data.candidates?.[0]?.content?.parts?.[0]?.text||"";
      const parsed=JSON.parse(text.replace(/```json|```/g,"").trim());
      setCopy(parsed.copy||"");setHashtags(parsed.hashtags||[]);setSelTags((parsed.hashtags||[]).slice(0,6));
    }catch{
      const pool=COPIES[tone]||COPIES.profesional;
      setCopy(pool[Math.floor(Math.random()*pool.length)]+(userText?"\n\n"+userText:""));
      setHashtags(HASHTAGS_BASE);setSelTags(HASHTAGS_BASE.slice(0,6));
    }
    setLoadingCopy(false);
  };

  const generateIdeas=async()=>{
    setLoadingIdeas(true);setIdeas([]);
    const prompt=`Sos un estratega de redes sociales para una Huerta Agroecológica Siglo XXI que vende productos, elaboraciones y da clases. Generá 8 ideas creativas de contenido para Instagram/WhatsApp. ${ideasTopic?`Tema específico: "${ideasTopic}".`:""} Respondé SOLO con JSON sin markdown: {"ideas":[{"titulo":"...","desc":"...","formato":"Reel|Imagen|Carrusel|Story","emoji":"..."},...]}`;
    try{
      const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})});
      const data=await res.json();
      const text=data.candidates?.[0]?.content?.parts?.[0]?.text||"";
      const parsed=JSON.parse(text.replace(/```json|```/g,"").trim());
      setIdeas(parsed.ideas||[]);
    }catch{
      setIdeas([
        {titulo:"Cosecha del día",desc:"Mostrá qué cosechaste hoy en la huerta",formato:"Reel",emoji:"🥬"},
        {titulo:"Receta con mis productos",desc:"Preparación simple con ingredientes de la huerta",formato:"Reel",emoji:"🍳"},
        {titulo:"Tip agroecológico",desc:"Un consejo para cuidar la tierra naturalmente",formato:"Imagen",emoji:"🌱"},
        {titulo:"Taller del mes",desc:"Presentá tu próximo taller o curso",formato:"Carrusel",emoji:"📚"},
        {titulo:"Antes y después de la huerta",desc:"Transformación de un espacio en huerta productiva",formato:"Carrusel",emoji:"✨"},
        {titulo:"¿Sabías que...?",desc:"Dato curioso sobre agroecología",formato:"Imagen",emoji:"🤔"},
        {titulo:"Elaboración artesanal",desc:"Mostrá cómo preparás una elaboración paso a paso",formato:"Reel",emoji:"🫙"},
        {titulo:"Testimonio de alumno",desc:"Compartí la experiencia de alguien que tomó tus talleres",formato:"Story",emoji:"⭐"},
      ]);
    }
    setLoadingIdeas(false);
  };

  const copyToClipboard=text=>{navigator.clipboard.writeText(text).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});};

  const shareToWhatsApp=()=>{
    const text=encodeURIComponent(copy+(selTags.length?"\n\n"+selTags.join(" "):""));
    window.open(`https://wa.me/?text=${text}`,"_blank");
  };

  const shareToInstagram=()=>{
    copyToClipboard(copy+(selTags.length?"\n\n"+selTags.join(" "):""));
    alert("✅ Texto copiado.\n\nAbrí Instagram, creá tu publicación y pegá el texto con el botón pegar.");
  };

  const saveToHistory=()=>{
    const item={id:Date.now(),date:new Date().toLocaleDateString("es-AR"),platform,copy,hashtags:selTags,filter,imgUrl:files[0]?.url||null};
    const updated=[item,...history];
    setHistory(updated);
    try{localStorage.setItem("ccs_history",JSON.stringify(updated));}catch{}
    setStep(0);setFiles([]);setCopy("");setHashtags([]);setUserText("");setFilter("none");setTextOverlay("");
    setTab(5);
  };

  const deleteHistory=i=>{
    const updated=history.filter((_,idx)=>idx!==i);
    setHistory(updated);
    try{localStorage.setItem("ccs_history",JSON.stringify(updated));}catch{}
  };

  const saveConfig=()=>{
    localStorage.setItem("ccs_ig_time",igTime);
    localStorage.setItem("ccs_wa_time",waTime);
    setShowConfig(false);
  };

  const saveProd=()=>{
    let updated;
    if(editIdx!==null){updated=productos.map((p,i)=>i===editIdx?prodForm:p);}
    else{updated=[...productos,prodForm];}
    setProductos(updated);
    try{localStorage.setItem("ccs_productos",JSON.stringify(updated));}catch{}
    setShowAddProd(false);setEditIdx(null);
    setProdForm({nombre:"",descripcion:"",precio:"",mostrarPrecio:true,categoria:"🌱 Producto",emoji:"🌱"});
  };

  const deleteProd=i=>{
    const updated=productos.filter((_,idx)=>idx!==i);
    setProductos(updated);
    try{localStorage.setItem("ccs_productos",JSON.stringify(updated));}catch{}
  };

  const previewImg=files.find(f=>f.file?.type?.startsWith("image/"))?.url;
  const fullText=copy+(selTags.length?"\n\n"+selTags.join(" "):"");
  const catColors={"🌱 Producto":"rgba(0,201,167,0.2)","🥗 Elaboración":"rgba(255,202,87,0.2)","📚 Enseñanza":"rgba(84,160,255,0.2)","🌿 Otro":"rgba(255,159,243,0.2)"};
  const catBorders={"🌱 Producto":"#00c9a7","🥗 Elaboración":"#feca57","📚 Enseñanza":"#54a0ff","🌿 Otro":"#ff9ff3"};

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#0a0a0a,#0d1f1a,#0a1628)",display:"flex",flexDirection:"column"}}>

      {/* Config Modal */}
      {showConfig&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.8)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#0d1f1a",borderRadius:20,padding:24,width:"100%",maxWidth:340,border:"1px solid rgba(0,201,167,0.3)"}}>
            <h3 style={{margin:"0 0 16px",fontSize:16}}>⚙️ Configuración</h3>
            <div style={{marginBottom:14}}>
              <Lbl>📸 Horario Instagram</Lbl>
              <input type="time" value={igTime} onChange={e=>setIgTime(e.target.value)} style={{width:"100%",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(0,201,167,0.3)",borderRadius:10,padding:"10px 14px",color:"#fff",fontSize:15,boxSizing:"border-box"}}/>
            </div>
            <div style={{marginBottom:20}}>
              <Lbl>💬 Horario WhatsApp</Lbl>
              <input type="time" value={waTime} onChange={e=>setWaTime(e.target.value)} style={{width:"100%",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(0,201,167,0.3)",borderRadius:10,padding:"10px 14px",color:"#fff",fontSize:15,boxSizing:"border-box"}}/>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setShowConfig(false)} style={{flex:1,padding:"12px",borderRadius:12,border:"1px solid rgba(255,255,255,0.2)",background:"transparent",color:"#fff",fontSize:14,cursor:"pointer"}}>Cancelar</button>
              <Btn onClick={saveConfig} style={{flex:2}}>💾 Guardar</Btn>
            </div>
          </div>
        </div>
      )}

      {/* Add/Edit Producto Modal */}
      {showAddProd&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.85)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16,overflowY:"auto"}}>
          <div style={{background:"#0d1f1a",borderRadius:20,padding:24,width:"100%",maxWidth:380,border:"1px solid rgba(0,201,167,0.3)"}}>
            <h3 style={{margin:"0 0 16px",fontSize:16}}>{editIdx!==null?"✏️ Editar":"➕ Agregar"} producto/servicio</h3>
            <div style={{marginBottom:10}}>
              <Lbl>Categoría</Lbl>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {CATEGORIAS.map(c=><button key={c} onClick={()=>setProdForm(p=>({...p,categoria:c,emoji:c[0]}))} style={{padding:"6px 10px",borderRadius:20,border:`1px solid ${prodForm.categoria===c?"#00c9a7":"rgba(255,255,255,0.2)"}`,background:prodForm.categoria===c?"rgba(0,201,167,0.2)":"transparent",color:prodForm.categoria===c?"#00c9a7":"rgba(255,255,255,0.6)",fontSize:12,cursor:"pointer"}}>{c}</button>)}
              </div>
            </div>
            <div style={{marginBottom:10}}>
              <Lbl>Nombre</Lbl>
              <input value={prodForm.nombre} onChange={e=>setProdForm(p=>({...p,nombre:e.target.value}))} placeholder="Ej: Lechuga orgánica, Taller de huerta..." style={{width:"100%",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(0,201,167,0.2)",borderRadius:8,padding:"10px",color:"#fff",fontSize:13,boxSizing:"border-box"}}/>
            </div>
            <div style={{marginBottom:10}}>
              <Lbl>Descripción</Lbl>
              <textarea value={prodForm.descripcion} onChange={e=>setProdForm(p=>({...p,descripcion:e.target.value}))} placeholder="Describí brevemente..." style={{width:"100%",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(0,201,167,0.2)",borderRadius:8,padding:"10px",color:"#fff",fontSize:13,boxSizing:"border-box",minHeight:60,resize:"vertical"}}/>
            </div>
            <div style={{marginBottom:10,display:"flex",alignItems:"center",gap:10}}>
              <div style={{flex:1}}>
                <Lbl>Precio (opcional)</Lbl>
                <input value={prodForm.precio} onChange={e=>setProdForm(p=>({...p,precio:e.target.value}))} placeholder="Ej: $1500" style={{width:"100%",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(0,201,167,0.2)",borderRadius:8,padding:"10px",color:"#fff",fontSize:13,boxSizing:"border-box"}}/>
              </div>
              <div style={{flexShrink:0,marginTop:14}}>
                <Lbl>Mostrar precio</Lbl>
                <button onClick={()=>setProdForm(p=>({...p,mostrarPrecio:!p.mostrarPrecio}))} style={{padding:"8px 14px",borderRadius:8,border:`1px solid ${prodForm.mostrarPrecio?"#00c9a7":"rgba(255,255,255,0.2)"}`,background:prodForm.mostrarPrecio?"rgba(0,201,167,0.2)":"transparent",color:prodForm.mostrarPrecio?"#00c9a7":"rgba(255,255,255,0.5)",fontSize:12,cursor:"pointer"}}>{prodForm.mostrarPrecio?"✅ Sí":"❌ No"}</button>
              </div>
            </div>
            <div style={{display:"flex",gap:10,marginTop:16}}>
              <button onClick={()=>{setShowAddProd(false);setEditIdx(null);}} style={{flex:1,padding:"12px",borderRadius:12,border:"1px solid rgba(255,255,255,0.2)",background:"transparent",color:"#fff",fontSize:14,cursor:"pointer"}}>Cancelar</button>
              <Btn onClick={saveProd} disabled={!prodForm.nombre} style={{flex:2}}>💾 Guardar</Btn>
            </div>
          </div>
        </div>
      )}

      {/* Header */}
      <div style={{background:"rgba(0,0,0,0.4)",backdropFilter:"blur(12px)",borderBottom:"1px solid rgba(0,201,167,0.15)",padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <img src="./icon.png" style={{width:38,height:38,borderRadius:"50%",objectFit:"cover",border:"2px solid #00c9a7"}}/>
          <div>
            <div className="rainbow" style={{fontSize:15}}>Huerta Agroecológica Siglo XXI</div>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.4)"}}>Productos · Elaboraciones · Enseñanza</div>
          </div>
        </div>
        <button onClick={()=>setShowConfig(true)} style={{background:"rgba(0,201,167,0.15)",border:"1px solid rgba(0,201,167,0.3)",color:"#00c9a7",borderRadius:10,padding:"8px 12px",fontSize:18,cursor:"pointer"}}>⚙️</button>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",overflowX:"auto",borderBottom:"1px solid rgba(0,201,167,0.15)",background:"rgba(0,0,0,0.3)",position:"sticky",top:60,zIndex:99}}>
        {TABS.map((t,i)=>(
          <button key={t} onClick={()=>{setTab(i);if(i===1)setStep(0);}} style={{padding:"10px 14px",border:"none",background:"transparent",color:tab===i?"#00c9a7":"rgba(255,255,255,0.4)",fontWeight:tab===i?700:400,fontSize:13,cursor:"pointer",borderBottom:tab===i?"2px solid #00c9a7":"2px solid transparent",whiteSpace:"nowrap",flexShrink:0,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <span>{t}</span>
            <span style={{fontSize:9}}>{TAB_LABELS[i]}</span>
          </button>
        ))}
      </div>

      <div style={{flex:1,maxWidth:640,width:"100%",margin:"0 auto",padding:"20px 16px 80px"}}>

        {/* INICIO */}
        {tab===0&&(
          <div>
            <h2 style={{textAlign:"center",marginBottom:4,fontSize:22}}>¡Hola Claudia! 👋🌱</h2>
            <p style={{textAlign:"center",color:"rgba(255,255,255,0.5)",fontSize:13,marginBottom:20}}>¿Qué querés hacer hoy?</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
              {[{icon:"📤",label:"Crear contenido",desc:"Subí archivos y generá copy con IA",t:1},{icon:"📅",label:"Planificar",desc:"Calendario semanal",t:2},{icon:"💡",label:"Ideas IA",desc:"Ideas para tu huerta",t:3},{icon:"🏷️",label:"Mis precios",desc:"Productos y servicios",t:4},{icon:"🕐",label:"Historial",desc:"Contenido guardado",t:5}].map(item=>(
                <Card key={item.t} onClick={()=>setTab(item.t)} style={{cursor:"pointer",textAlign:"center",border:"1px solid rgba(0,201,167,0.15)"}}>
                  <div style={{fontSize:28,marginBottom:6}}>{item.icon}</div>
                  <div style={{fontWeight:700,fontSize:13,marginBottom:2}}>{item.label}</div>

                              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
                                <div style={{flex:1}}>
                                  <div style={{fontWeight:700,fontSize:14,marginBottom:3}}>{prod.emoji} {prod.nombre}</div>
                                  {prod.descripcion&&<div style={{fontSize:12,color:"rgba(255,255,255,0.6)",marginBottom:4,lineHeight:1.4}}>{prod.descripcion}</div>}
                                  {prod.mostrarPrecio&&prod.precio&&<div style={{fontSize:14,fontWeight:700,color:catBorders[cat]||"#00c9a7"}}>{prod.precio}</div>}
                                  {!prod.mostrarPrecio&&<div style={{fontSize:11,color:"rgba(255,255,255,0.3)",fontStyle:"italic"}}>Precio a consultar</div>}
                                </div>
                                <div style={{display:"flex",gap:6,flexShrink:0}}>
                                  <button onClick={()=>{setEditIdx(realIdx);setProdForm({...prod});setShowAddProd(true);}} style={{background:"rgba(255,255,255,0.1)",border:"none",color:"#fff",borderRadius:8,padding:"5px 10px",fontSize:12,cursor:"pointer"}}>✏️</button>
                                  <button onClick={()=>deleteProd(realIdx)} style={{background:"rgba(255,87,87,0.2)",border:"none",color:"#ff5757",borderRadius:8,padding:"5px 10px",fontSize:12,cursor:"pointer"}}>🗑️</button>
                                </div>
                              </div>
                            </Card>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* HISTORIAL */}
        {tab===5&&(
          <div>
            <h2 style={{textAlign:"center",marginBottom:16,fontSize:18}}>🕐 Historial</h2>
            {history.length===0?(
              <div style={{textAlign:"center",padding:40,color:"rgba(255,255,255,0.3)"}}>
                <div style={{fontSize:40,marginBottom:12}}>📂</div>
                <div style={{marginBottom:16}}>Todavía no guardaste contenido</div>
                <button onClick={()=>setTab(1)} style={{padding:"10px 24px",borderRadius:12,border:"none",background:"linear-gradient(135deg,#00c9a7,#00b4db)",color:"#fff",fontWeight:700,cursor:"pointer"}}>Crear contenido</button>
              </div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                {history.map((h,i)=>(
                  <Card key={h.id} style={{display:"flex",gap:12,border:"1px solid rgba(0,201,167,0.1)"}}>
                    {h.imgUrl?<img src={h.imgUrl} style={{width:56,height:56,borderRadius:10,objectFit:"cover",flexShrink:0}}/>:<div style={{width:56,height:56,borderRadius:10,background:"rgba(0,201,167,0.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>📝</div>}
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                        <span style={{fontSize:11,background:"rgba(0,201,167,0.2)",color:"#00c9a7",padding:"2px 8px",borderRadius:10}}>{h.platform}</span>
                        <span style={{fontSize:10,color:"rgba(255,255,255,0.35)"}}>{h.date}</span>
                      </div>
                      <div style={{fontSize:12,color:"rgba(255,255,255,0.7)",lineHeight:1.4,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{h.copy}</div>
                      <div style={{display:"flex",gap:6,marginTop:6}}>
                        <button onClick={()=>copyToClipboard(h.copy+"\n\n"+h.hashtags.join(" "))} style={{background:"rgba(0,201,167,0.15)",border:"none",color:"#00c9a7",borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer"}}>Copiar</button>
                        <button onClick={()=>deleteHistory(i)} style={{background:"rgba(255,87,87,0.2)",border:"none",color:"#ff5757",borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer"}}>Borrar</button>
                      </div>
                    </div>
                  </Card>
                ))}
              </div>
            )}
          </div>
        )}

      </div>
    </div>
  );
}
ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
<script>
  if("serviceWorker" in navigator){
    window.addEventListener("load",()=>{
      navigator.serviceWorker.register("/sw.js").catch(e=>console.log("SW:",e));
    });
  }
</script>
</body>
</html>
